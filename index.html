<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guessing Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 18%),
                  radial-gradient(circle at 80% 20%, rgba(255,255,255,0.25), transparent 15%),
                  radial-gradient(circle at 40% 70%, rgba(255,255,255,0.2), transparent 12%),
                  linear-gradient(135deg, #2b0d44, #502c95, #6f47bf);
      background-blend-mode: screen, screen, screen, normal;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.18;
      pointer-events: none;
      animation: shimmer 10s linear infinite;
      mix-blend-mode: screen;
    }

    @keyframes shimmer {
      from { transform: translate(0, 0); }
      to { transform: translate(30%, 30%); }
    }

    .game-card {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .game-card input,
    .game-card button {
      font-size: 16px;
      padding: 10px;
      margin-top: 10px;
    }
    .game-card input {
      width: calc(100% - 132px);
    }
    .game-card button {
      cursor: pointer;
    }
    .message {
      margin: 20px 0;
      min-height: 48px;
    }
    .kitty {
      position: absolute;
      right: 10px;
      top: -10px;
      width: 140px;
      height: 140px;
      transform: rotate(-12deg);
      animation: kitty-wag 3s ease-in-out infinite;
      pointer-events: none;
    }
    .kitty .body {
      position: absolute;
      width: 90px;
      height: 70px;
      background: rgba(255,255,255,0.9);
      border-radius: 50% 50% 45% 50%;
      top: 50px;
      left: 20px;
      box-shadow: inset -4px -6px 0 rgba(0,0,0,0.08);
    }
    .kitty .head {
      position: absolute;
      width: 84px;
      height: 72px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      top: 0;
      left: 26px;
      box-shadow: 0 8px 0 rgba(0,0,0,0.1);
    }
    .kitty .ear {
      position: absolute;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.95);
      border-radius: 0 0 40% 40%;
      top: 0;
      box-shadow: inset 0 4px 0 rgba(0,0,0,0.08);
    }
    .kitty .ear.left { left: 10px; transform: rotate(-20deg); }
    .kitty .ear.right { right: 10px; transform: rotate(20deg); }
    .kitty .eye {
      position: absolute;
      width: 10px;
      height: 14px;
      background: #333;
      border-radius: 50%;
      top: 28px;
    }
    .kitty .eye.left { left: 32px; }
    .kitty .eye.right { right: 32px; }
    .kitty .nose {
      position: absolute;
      width: 12px;
      height: 8px;
      background: #f19ca4;
      border-radius: 50% 50% 60% 60%;
      top: 42px;
      left: 36px;
    }
    .kitty .whiskers {
      position: absolute;
      width: 60px;
      height: 12px;
      top: 46px;
      left: 12px;
    }
    .kitty .whiskers::before,
    .kitty .whiskers::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(0,0,0,0.18);
      top: 0;
    }
    .kitty .whiskers::after { top: 10px; }
    .kitty .whiskers span {
      position: absolute;
      width: 22px;
      height: 2px;
      background: rgba(0,0,0,0.18);
    }
    .kitty .whiskers span.left { left: 0; transform: rotate(-18deg); }
    .kitty .whiskers span.right { right: 0; transform: rotate(18deg); }
    .kitty .tail {
      position: absolute;
      width: 16px;
      height: 80px;
      background: rgba(255,255,255,0.9);
      border-radius: 50px;
      top: 50px;
      right: -10px;
      transform-origin: top center;
      animation: tail-swish 1.2s ease-in-out infinite;
      box-shadow: inset -2px 0 0 rgba(0,0,0,0.08);
    }
    @keyframes kitty-wag {
      0%, 100% { transform: translateY(0) rotate(-12deg); }
      50% { transform: translateY(-8px) rotate(-8deg); }
    }
    @keyframes tail-swish {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(18deg); }
    }
  </style>
</head>
<body>
  <div class="kitty">
    <div class="ear left"></div>
    <div class="ear right"></div>
    <div class="head">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
      <div class="whiskers">
        <span class="left"></span>
        <span class="right"></span>
      </div>
    </div>
    <div class="body"></div>
    <div class="tail"></div>
  </div>
  <div class="game-card">
    <h1>Guess the Secret Number</h1>
    <p>Enter a number between 1 and 10. You have 3 attempts per round.</p>

    <div>
      <label for="guess-input">Your guess:</label>
      <input id="guess-input" type="number" min="1" max="10" />
      <button id="guess-button">Submit Guess</button>
    </div>

    <div class="message" id="message"></div>
    <div>
      <p>Attempt: <span id="attempt-count">0</span> / <span id="max-attempts">3</span></p>
    </div>
    <button id="restart-button" style="display:none;">Play Again</button>
  </div>

  <script>
    const secretNumber = { value: 0 };
    const maxAttempts = 3;
    let attempt = 0;
    let gameOver = false;

    const guessInput = document.getElementById('guess-input');
    const guessButton = document.getElementById('guess-button');
    const restartButton = document.getElementById('restart-button');
    const messageEl = document.getElementById('message');
    const attemptCountEl = document.getElementById('attempt-count');
    const maxAttemptsEl = document.getElementById('max-attempts');

    function startGame() {
      secretNumber.value = Math.floor(Math.random() * 10) + 1;
      attempt = 0;
      gameOver = false;
      guessInput.value = '';
      messageEl.textContent = 'Good luck!';
      attemptCountEl.textContent = attempt;
      restartButton.style.display = 'none';
      guessButton.disabled = false;
      guessInput.disabled = false;
      guessInput.focus();
    }

    function endGame(finalMessage) {
      gameOver = true;
      messageEl.textContent = finalMessage;
      restartButton.style.display = 'inline-block';
      guessButton.disabled = true;
      guessInput.disabled = true;
    }

    guessButton.addEventListener('click', () => {
      if (gameOver) return;

      const guess = Number(guessInput.value);

      if (!guess || guess < 1 || guess > 10) {
        messageEl.textContent = 'Please enter a valid number between 1 and 10.';
        guessInput.focus();
        return;
      }

      attempt += 1;
      attemptCountEl.textContent = attempt;

      if (guess === secretNumber.value) {
        endGame('Correct! You guessed the secret number.');
        return;
      }

      if (attempt >= maxAttempts) {
        endGame(`Sorry, you ran out of attempts. The secret number was ${secretNumber.value}.`);
        return;
      }

      messageEl.textContent = guess < secretNumber.value
        ? 'Too low. Try again.'
        : 'Too high. Try again.';
      guessInput.value = '';
      guessInput.focus();
    });

    restartButton.addEventListener('click', () => {
      startGame();
    });

    startGame();
  </script>
</body>
</html>
