<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guessing Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 18%),
                  radial-gradient(circle at 80% 20%, rgba(255,255,255,0.25), transparent 15%),
                  radial-gradient(circle at 40% 70%, rgba(255,255,255,0.2), transparent 12%),
                  linear-gradient(135deg, #2b0d44, #502c95, #6f47bf);
      background-blend-mode: screen, screen, screen, normal;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      background-image: radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.18;
      pointer-events: none;
      animation: shimmer 10s linear infinite;
      mix-blend-mode: screen;
    }

    @keyframes shimmer {
      from { transform: translate(0, 0); }
      to { transform: translate(30%, 30%); }
    }

    .game-card {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .game-card input,
    .game-card button {
      font-size: 16px;
      padding: 10px;
      margin-top: 10px;
    }
    .game-card input {
      width: calc(100% - 132px);
    }
    .game-card button {
      cursor: pointer;
    }
    .message {
      margin: 20px 0;
      min-height: 48px;
    }
    @keyframes shimmer {
      from { transform: translate(0, 0); }
      to { transform: translate(30%, 30%); }
    }
  </style>
</head>
<body>
  <div class="game-card">
    <h1>Guess the Secret Number</h1>
    <p>Enter a number between 1 and 10. You have 3 attempts per round.</p>

    <div>
      <label for="guess-input">Your guess:</label>
      <input id="guess-input" type="number" min="1" max="10" />
      <button id="guess-button">Submit Guess</button>
    </div>

    <div class="message" id="message"></div>
    <div>
      <p>Attempt: <span id="attempt-count">0</span> / <span id="max-attempts">3</span></p>
    </div>
    <button id="restart-button" style="display:none;">Play Again</button>
  </div>

  <script>
    const secretNumber = { value: 0 };
    const maxAttempts = 3;
    let attempt = 0;
    let gameOver = false;

    const guessInput = document.getElementById('guess-input');
    const guessButton = document.getElementById('guess-button');
    const restartButton = document.getElementById('restart-button');
    const messageEl = document.getElementById('message');
    const attemptCountEl = document.getElementById('attempt-count');
    const maxAttemptsEl = document.getElementById('max-attempts');

    function startGame() {
      secretNumber.value = Math.floor(Math.random() * 10) + 1;
      attempt = 0;
      gameOver = false;
      guessInput.value = '';
      messageEl.textContent = 'Good luck!';
      attemptCountEl.textContent = attempt;
      restartButton.style.display = 'none';
      guessButton.disabled = false;
      guessInput.disabled = false;
      guessInput.focus();
    }

    function endGame(finalMessage) {
      gameOver = true;
      messageEl.textContent = finalMessage;
      restartButton.style.display = 'inline-block';
      guessButton.disabled = true;
      guessInput.disabled = true;
    }

    guessButton.addEventListener('click', () => {
      if (gameOver) return;

      const guess = Number(guessInput.value);

      if (!guess || guess < 1 || guess > 10) {
        messageEl.textContent = 'Please enter a valid number between 1 and 10.';
        guessInput.focus();
        return;
      }

      attempt += 1;
      attemptCountEl.textContent = attempt;

      if (guess === secretNumber.value) {
        endGame('Correct! You guessed the secret number.');
        return;
      }

      if (attempt >= maxAttempts) {
        endGame(`Sorry, you ran out of attempts. The secret number was ${secretNumber.value}.`);
        return;
      }

      messageEl.textContent = guess < secretNumber.value
        ? 'Too low. Try again.'
        : 'Too high. Try again.';
      guessInput.value = '';
      guessInput.focus();
    });

    restartButton.addEventListener('click', () => {
      startGame();
    });

    startGame();
  </script>
</body>
</html>
